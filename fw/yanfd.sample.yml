core:
  # [optional] Logging level (default: INFO)
  log_level: INFO
  # [optional] Output log to file (default: "" = stderr)
  log_file: ""

faces:
  # [optional] Socket path for Unix stream transport
  # Uncomment to override the platform default
  # unix:
  #   socket_path: /run/nfd/nfd.sock

fw:
  # [optional] Number of forwarding threads (default: 8)
  threads: 8
  # [optional] Router name (set by routing daemon)
  router_name: ""
  # [optional] BIER bit index for this router (-1 = disabled)
  bier_index: -1

tables:
  rib:
    # [optional] Enables readvertising to the routing daemon (default: true)
    readvertise_nlsr: true
